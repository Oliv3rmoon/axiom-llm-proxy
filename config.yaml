general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  num_retries: 3
  allowed_fails: 2
  cooldown_time: 30
  fallbacks:
    - claude-opus-4-6: [claude-sonnet-4-5, claude-haiku-4-5]
    - claude-sonnet-4-5: [claude-haiku-4-5]
    - glm-5.1: [claude-sonnet-4-5, claude-haiku-4-5]
    - glm-5: [claude-sonnet-4-5, claude-haiku-4-5]
    - venice-uncensored: [venice-large]
    - venice-large: [venice-uncensored]
  context_window_fallbacks:
    - glm-5.1: [claude-sonnet-4-5]
    - glm-5: [claude-sonnet-4-5]